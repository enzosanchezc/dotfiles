[colors]
background = #171717
background-alt = #202020
foreground = #b2a191
primary = #707d22
secondary = #627a92
alert = #A54242
disabled = #707880

[bar/main]
bottom = false
width = 100%
height = 15pt
radius = 0
dim-value = 0.95
padding = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = NotoSansMono Nerd Font:style=Regular:size=8;2

modules-left = xworkspaces xwindow
modules-right = system-bluetooth-bluetoothctl vpn-networkmanager-status filesystem pulseaudio backlight memory load-average wlan eth battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = Ôā† %mountpoint% %free%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "Ô©Ĺ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

use-ui-max = false

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %free%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{A1:nm-connection-editor:}%ifname% down%{A}
label-connected = %ifname% %local_ip%

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %ifname% %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %ifname% %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %d-%m-%Y %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/backlight]
type = internal/backlight

card = intel_backlight

use-actual-brightness = true

enable-scroll = true

[module/battery]
type = internal/battery

full-at = 99

low-at = 15

battery = BAT0
adapter = ADP1

poll-interval = 5

time-format = %H:%M

format-charging = <label-charging>

format-discharging = <label-discharging>

label-charging = ÔČÄ  %percentage%%+

label-discharging = ÔČÄ  %percentage%%

label-full = %{F#707d22}ÔČÄ %{F-}

label-low = ÔČÄ  LOW %time%

animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[module/system-bluetooth-bluetoothctl]
type = custom/script
exec = ~/.config/polybar/scripts/system-bluetooth-bluetoothctl.sh
tail = true
click-left = ~/-config/polybar/scripts/system-bluetooth-bluetoothctl.sh --toggle &

[module/vpn-networkmanager-status]
type = custom/script
exec = ~/.config/polybar/scripts/vpn-networkmanager-status.sh
interval = 10

[module/load-average]
type = custom/script
exec = ~/.config/polybar/scripts/load-average.sh
interval = 5

;[module/openweathermap-simple]
;type = custom/script
;exec = ~/.config/polybar/scripts/openweathermap-simple.sh
;interval = 600
;label-font = 3


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
